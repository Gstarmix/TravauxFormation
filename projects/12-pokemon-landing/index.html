<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="assets/css/reset.css" />
    <link rel="stylesheet" href="assets/css/style.css" />

    <title>Starfleet</title>
  </head>
  <body class="body">
    <header class="header"></header>

    <nav class="nav">
      <div class="container">
        <img
          class="nav__logo"
          src="assets/images/pokeball.svg"
          alt="Logo Starfleet"
        />
        <menu class="nav__menu">
          <li class="nav__menu_li">
            <a class="nav__menu_li_a" href="#">accueil</a>
          </li>
          <li class="nav__menu_li">
            <a class="nav__menu_li_a" href="#">nos pokémons</a>
          </li>
          <li class="nav__menu_li">
            <a class="nav__menu_li_a" href="#">à propos</a>
          </li>
        </menu>
        <button class="nav__burger" type="button" aria-label="Ouvrir le menu">☰</button>
        <a href="#" class="button nav__button">Nous rejoindre</a>
      </div>
    </nav>

    <section class="one">
      <div class="container">
        <div class="one__content">
          <h2 class="one__content_title">Défendez le système solaire</h2>
          <p class="one__content_description">
            Depuis maintenant plus de 50 ans, nous tentons devenir des maîtres
            Pokémon, sans succès.
          </p>
          <a class="button one__content_button" href="#"
            >En savoir plus <span class="one__content_button_fleche">➔</span></a
          >
        </div>
        <img class="one__render" src="assets/images/pika.webp" alt="Vaisseau en mise en avant" />
      </div>
    </section>
    <section class="two">
      <div class="container">
        <h2 class="two__title">Jouez maintenant</h2>
        <div class="two__gallery">
          <figure class="two__gallery_img">
            <img src="assets/images/plante.webp" alt="Visuel Plante" />
            <figcaption class="two__gallery_img_description">Plante</figcaption>
          </figure>
          <figure class="two__gallery_img">
            <img src="assets/images/feu.webp" alt="Visuel Feu" />
            <figcaption class="two__gallery_img_description">Feu</figcaption>
          </figure>
          <figure class="two__gallery_img">
            <img src="assets/images/eau.webp" alt="Visuel Eau" />
            <figcaption class="two__gallery_img_description">Eau</figcaption>
          </figure>
          <figure class="two__gallery_img">
            <img src="assets/images/9g.webp" alt="Visuel Autre" />
            <figcaption class="two__gallery_img_description">Autre</figcaption>
          </figure>
        </div>
        <a href="#" class="button two__button"
          >En savoir plus <span class="two__button_fleche">➔</span></a
        >
      </div>
    </section>
  </body>
</html>
