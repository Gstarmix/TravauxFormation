<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="assets/css/minireset.min.css" />
    <link rel="stylesheet" href="assets/css/style.css" />

    <title>Classes manquantes</title>
  </head>

  <body class="body">
    <header class="header">
      <div class="header__content">
        <div class="header__content_box">
          <h1 class="header__content_box_title">Les couleurs</h1>
          <p class="header__content_box_description">
            Il existe une infinité de couleurs.
          </p>
          <a class="header__content_box_cta" href="#colors">Découvrir toutes les couleurs</a>
        </div>
      </div>
      <div class="header__illustration" role="img" aria-label="Palette de couleurs vives"></div>
    </header>
    <section class="colors" id="colors">
      <div class="container">
        <h2 class="colors__title">Quelques couleurs</h2>
        <ul class="colors__grid">
          <li class="colors__grid_color colors__grid_color--yellow"></li>
          <li class="colors__grid_color colors__grid_color--red"></li>
          <li class="colors__grid_color colors__grid_color--blue"></li>
          <li class="colors__grid_color colors__grid_color--green"></li>
          <li class="colors__grid_color colors__grid_color--orange"></li>
          <li class="colors__grid_color colors__grid_color--purple"></li>
        </ul>
      </div>
    </section>
    <footer class="footer">
      <div class="container">
        <p>Exercice sur le nommage des classes en BEM en SASS.</p>
      </div>
    </footer>
  </body>
</html>
